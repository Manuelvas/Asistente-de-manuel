<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asistente de Manuel ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
min-height:100vh;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:white;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.2);
position:relative;
z-index:2;
}

.hidden{
display:none;
}

.assistant{
background:#f7f7f7;
padding:20px;
border-radius:15px;
line-height:1.8;
white-space:pre-line;
margin-top:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
background:#ff6b81;
color:white;
cursor:pointer;
font-size:16px;
margin-top:15px;
}

button:hover{
transform:scale(1.05);
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

#loader{
position:fixed;
inset:0;
background:#ff6b81;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:28px;
font-weight:bold;
z-index:999;
}

.carta{
font-size:90px;
cursor:pointer;
animation:latir 1s infinite;
}

@keyframes latir{
50%{transform:scale(1.15);}
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
margin-top:20px;
}

.galeria img{
width:100%;
border-radius:15px;
}

.heart{
position:fixed;
font-size:25px;
animation:subir 5s linear forwards;
pointer-events:none;
}

@keyframes subir{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}

.contador{
margin-top:15px;
font-weight:bold;
color:#ff4d6d;
font-size:18px;
}

</style>
</head>

<body>

<div id="loader">
❤️ Cargando mensaje especial...
</div>

<div class="container">

<!-- LOGIN -->

<div id="login">

<h2>🔐 Panel Admin</h2>

<input type="password" id="clave" placeholder="Contraseña">

<input id="nombre" placeholder="Tu nombre">

<input id="pareja" placeholder="Nombre de tu pareja">

<textarea id="mensaje" placeholder="Escribe tu mensaje"></textarea>

<button onclick="entrar()">Entrar</button>

</div>

<!-- ADMIN -->

<div id="admin" class="hidden">

<h2>💌 Generador de Enlace</h2>

<button onclick="crearLink()">Generar Link</button>

<div id="link" class="assistant"></div>

</div>

<!-- PRESENTACION -->

<div id="presentacion" class="hidden">

<div id="saludo" class="assistant"></div>

<div id="contador" class="contador"></div>

<button onclick="mostrarCarta()">
Ver tu sorpresa ❤️
</button>

</div>

<!-- CARTA -->

<div id="cartaBox" class="hidden">

<div class="carta" onclick="verNota()">
💌
</div>

<p>Toca la carta</p>

</div>

<!-- NOTA -->

<div id="nota" class="hidden">

<div id="contenido" class="assistant"></div>

<div class="galeria">

<img src="https://picsum.photos/300?1">
<img src="https://picsum.photos/300?2">
<img src="https://picsum.photos/300?3">
<img src="https://picsum.photos/300?4">

</div>

</div>

</div>

<script>

setTimeout(()=>{
loader.style.display="none";
},2500);

const PASSWORD="Manuel2026❤️";

function entrar(){

if(clave.value===PASSWORD){

login.classList.add("hidden");
admin.classList.remove("hidden");

}else{

alert("Contraseña incorrecta");

}

}

function crearLink(){

const url=
`${location.origin}${location.pathname}
?modo=novia
&n=${encodeURIComponent(nombre.value)}
&p=${encodeURIComponent(pareja.value)}
&m=${encodeURIComponent(mensaje.value)}`;

link.innerText=url.replace(/\n/g,'');

}

function escribir(el,texto){

let i=0;

el.innerHTML="";

function efecto(){

if(i<texto.length){

el.innerHTML+=texto.charAt(i);

i++;

setTimeout(efecto,25);

}

}

efecto();

}

function mostrarCarta(){

presentacion.classList.add("hidden");

cartaBox.classList.remove("hidden");

}

function verNota(){

cartaBox.classList.add("hidden");

nota.classList.remove("hidden");

const fechaHoy=new Date().toLocaleDateString("es-ES");

escribir(contenido,

`💖 Para: ${params.get('p')}

📅 Fecha: ${fechaHoy}

💌 Mensaje:

"${params.get('m')}"

Con mucho cariño,

${params.get('n')} ❤️`);

}

const params=new URLSearchParams(location.search);

if(params.get("modo")==="novia"){

login.classList.add("hidden");

presentacion.classList.remove("hidden");

escribir(saludo,

`💖 Hola ${params.get('p')}

Soy el asistente personal de Manuel.

Él preparó esta sorpresa especialmente para ti.

Tengo una carta y algunos recuerdos que mostrarte.

Cuando estés lista presiona continuar ❤️`);

const inicio=new Date("2023-02-09");

const hoy=new Date();

const dias=Math.floor(
(hoy-inicio)/(1000*60*60*24)
);

contador.innerHTML=
`❤️ Han pasado ${dias} días desde el 09/02/2023`;

}

setInterval(()=>{

const h=document.createElement("div");

h.className="heart";

h.innerHTML="💗";

h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},5000);

},500);

</script>

</body>
</html>
