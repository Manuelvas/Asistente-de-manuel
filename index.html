<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asistente de Manuel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      overflow: hidden;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 400px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .assistant {
      background: #f1f1f1;
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
      min-height: 120px;
      white-space: pre-line;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #ff6b81;
      color: white;
      cursor: pointer;
      font-weight: bold;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .show-btn { opacity: 1; }
    .hidden { display: none; }

    .fade { animation: fadeIn 1s ease forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Carta animada */
    .carta {
      width: 100px;
      height: 70px;
      background: #fff;
      border: 2px solid #ff6b81;
      position: relative;
      margin: 20px auto;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 1s;
    }

    .carta.open {
      transform: rotateX(180deg);
    }

    /* Corazones */
    .heart {
      position: absolute;
      color: #ff6b81;
      animation: floatUp 5s linear infinite;
      z-index: 1;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh); opacity: 1; }
      to { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="container">

  <div id="presentacion" class="hidden">
    <div class="assistant fade" id="textoPresentacion"></div>
    <button id="btnVer" onclick="mostrarCarta()">Ver nota 💌</button>
  </div>

  <!-- Carta animada -->
  <div id="cartaBox" class="hidden">
    <div class="carta" onclick="verNota()"></div>
    <p>Toca la carta 💌</p>
  </div>

  <div id="notaFinal" class="hidden">
    <div class="assistant fade" id="textoNota"></div>

    <!-- BOTÓN OPCIONAL VOZ -->
    <button id="btnAudio" onclick="reproducirAudio()" style="opacity:1;">🎤 Escuchar mensaje</button>
  </div>

</div>

<!-- SONIDOS -->
<audio id="sonidoClick">
  <source src="https://www.soundjay.com/buttons/sounds/button-09.mp3" type="audio/mpeg">
</audio>

<audio id="musica" loop autoplay>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<!-- AUDIO PERSONAL (CAMBIAS ESTE LINK CUANDO QUIERAS) -->
<audio id="audioPersonal">
  <source src="" type="audio/mpeg">
</audio>

<script>
let nombrePareja = '';
let mensajeNota = '';

// Máquina escribir
function escribirTexto(el, texto, vel=40){
  let i=0;
  el.innerText='';
  function escribir(){
    if(i<texto.length){
      el.innerText += texto.charAt(i);
      i++;
      setTimeout(escribir, vel);
    }
  }
  escribir();
}

function mostrarCarta(){
  document.getElementById('presentacion').classList.add('hidden');
  document.getElementById('cartaBox').classList.remove('hidden');
}

function verNota(){
  document.getElementById('cartaBox').classList.add('hidden');
  document.getElementById('notaFinal').classList.remove('hidden');

  const texto = `💌 Esta nota es para ${nombrePareja}\n\n"${mensajeNota}" 💖`;
  escribirTexto(document.getElementById('textoNota'), texto);

  document.getElementById('sonidoClick').play();
}

function reproducirAudio(){
  const audio = document.getElementById('audioPersonal');
  if(audio.src){
    audio.play();
  } else {
    alert('No hay audio configurado');
  }
}

// Corazones
function crearCorazon(){
  const heart = document.createElement('div');
  heart.className='heart';
  heart.innerText='💗';
  heart.style.left=Math.random()*100+'vw';
  heart.style.fontSize=(Math.random()*20+10)+'px';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
}
setInterval(crearCorazon,500);

// Cargar link
window.addEventListener('DOMContentLoaded',()=>{
  const params = new URLSearchParams(window.location.search);

  if(params.get('m')){
    nombrePareja = params.get('p');
    mensajeNota = params.get('m');

    document.getElementById('presentacion').classList.remove('hidden');

    const texto = `💌 Hola ${nombrePareja}, soy el asistente de Manuel\n\nTengo una nota para ti 💖`;
    escribirTexto(document.getElementById('textoPresentacion'), texto);

    setTimeout(()=>{
      document.getElementById('btnVer').classList.add('show-btn');
    },3000);
  }
});
</script>

</body>
</html>
