<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asistente de Manuel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 400px;
      text-align: center;
    }

    .assistant {
      background: #f1f1f1;
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
      min-height: 120px;
      white-space: pre-line;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #ff6b81;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .link-box {
      margin-top: 10px;
      font-size: 12px;
      word-break: break-all;
      background: #eee;
      padding: 10px;
      border-radius: 10px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<div class="container">
  <h1>💖 Asistente de Manuel</h1>

  <div id="login">
    <input type="password" id="clave" placeholder="Contraseña">
    <button onclick="entrar()">Entrar</button>
  </div>

  <div id="app" class="hidden">

    <input type="text" id="nombre" placeholder="Tu nombre">
    <input type="text" id="pareja" placeholder="Nombre de tu pareja">
    <textarea id="mensaje" placeholder="Mensaje..."></textarea>

    <button onclick="generarLink()">💌 Crear Nota y Link</button>

    <div class="assistant" id="pantalla"></div>

    <div id="linkGenerado" class="link-box hidden"></div>

  </div>
</div>

<script>
const PASSWORD = "1234";

function entrar(){
  const clave = document.getElementById('clave').value;
  const loginDiv = document.getElementById('login');
  const appDiv = document.getElementById('app');

  if(clave === PASSWORD){
    loginDiv.style.display = 'none';
    appDiv.classList.remove('hidden');
  } else {
    alert('Contraseña incorrecta');
  }
}

function generarLink(){
  const nombre = document.getElementById('nombre').value;
  const pareja = document.getElementById('pareja').value;
  const mensaje = document.getElementById('mensaje').value;

  if(!nombre || !pareja || !mensaje){
    alert('Completa todos los campos');
    return;
  }

  const url = `${window.location.origin}${window.location.pathname}?n=${encodeURIComponent(nombre)}&p=${encodeURIComponent(pareja)}&m=${encodeURIComponent(mensaje)}`;

  document.getElementById('pantalla').innerText = 'Nota guardada y link generado 💌';

  const linkBox = document.getElementById('linkGenerado');
  linkBox.classList.remove('hidden');
  linkBox.innerText = url;

  navigator.clipboard.writeText(url);
}

// Cargar nota desde link (SIN LOGIN)
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);

  if(params.get('m')){
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');

    const texto = `💌 Hola, soy el asistente de Manuel

${params.get('p')}, tienes una nota:

"${params.get('m')}" 💖`;

    document.getElementById('pantalla').innerText = texto;

    // ocultar todo lo editable
    document.getElementById('nombre').style.display = 'none';
    document.getElementById('pareja').style.display = 'none';
    document.getElementById('mensaje').style.display = 'none';
    document.querySelectorAll('button').forEach(btn => btn.style.display = 'none');
    document.getElementById('linkGenerado').style.display = 'none';
  }
});
</script>

</body>
</html>
