<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asistente de Manuel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 400px;
      text-align: center;
    }

    .assistant {
      background: #f1f1f1;
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
      min-height: 120px;
      white-space: pre-line;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #ff6b81;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-top: 10px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<div class="container">
  <h1>💖 Asistente de Manuel</h1>

  <!-- LOGIN -->
  <div id="login">
    <input type="password" id="clave" placeholder="Contraseña">
    <button onclick="entrar()">Entrar</button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">

    <input type="text" id="nombre" placeholder="Tu nombre">
    <input type="text" id="pareja" placeholder="Nombre de tu pareja">
    <textarea id="mensaje" placeholder="Mensaje..."></textarea>

    <input type="date" id="fecha">
    <input type="file" id="foto" accept="image/*">

    <button onclick="guardarNota()">Guardar Nota Programada</button>
    <button onclick="mostrarNotas()">Ver Notas Disponibles</button>

    <div class="assistant" id="pantalla"></div>
    <img id="imagen" class="hidden">

  </div>
</div>

<script>
const PASSWORD = "1234";

function entrar(){
  const clave = document.getElementById('clave').value;
  const loginDiv = document.getElementById('login');
  const appDiv = document.getElementById('app');

  if(clave === PASSWORD){
    loginDiv.classList.add('hidden');
    appDiv.classList.remove('hidden');
  } else {
    alert('Contraseña incorrecta');
  }
} else alert('Incorrecta');
}

function guardarNota(){
  const file = document.getElementById('foto').files[0];

  // Función para guardar la nota
  function guardar(imagenBase64 = null){
    const nota = {
      nombre: nombre.value,
      pareja: pareja.value,
      mensaje: mensaje.value,
      fecha: fecha.value,
      imagen: imagenBase64
    };

    let notas = JSON.parse(localStorage.getItem('notas')) || [];
    notas.push(nota);
    localStorage.setItem('notas', JSON.stringify(notas));

    alert('Nota programada 💌');

    // limpiar campos
    mensaje.value = '';
    foto.value = '';
  }

  // Si hay imagen
  if(file){
    const reader = new FileReader();
    reader.onload = function(){
      guardar(reader.result);
    };
    reader.readAsDataURL(file);
  } else {
    // Si NO hay imagen (este era el problema)
    guardar();
  }
};

    let notas = JSON.parse(localStorage.getItem('notas')) || [];
    notas.push(nota);
    localStorage.setItem('notas', JSON.stringify(notas));

    alert('Nota programada 💌');
  };

  if(file) reader.readAsDataURL(file);
}

function mostrarNotas(){
  const hoy = new Date().toISOString().split('T')[0];
  let notas = JSON.parse(localStorage.getItem('notas')) || [];

  const disponibles = notas.filter(n => n.fecha <= hoy);

  if(disponibles.length === 0){
    pantalla.innerText = 'No hay notas disponibles aún 💭';
    return;
  }

  const nota = disponibles[disponibles.length - 1];

  pantalla.innerText = `💌 Soy el asistente de ${nota.nombre}\n\nHola ${nota.pareja}, tienes una nota:\n\n"${nota.mensaje}"`;

  if(nota.imagen){
    imagen.src = nota.imagen;
    imagen.classList.remove('hidden');
  }
}
</script>

</body>
</html>
