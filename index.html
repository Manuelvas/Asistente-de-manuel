<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel de Manuel</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:20px;
width:500px;
max-width:90%;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

#resultado{
margin-top:20px;
padding:15px;
background:#f5f5f5;
border-radius:10px;
word-break:break-all;
}

</style>
</head>

<body>

<div class="container">

<h2>💌 Generador de Notas</h2>

<input id="nombre" placeholder="Tu nombre">

<input id="pareja" placeholder="Nombre de ella">

<textarea id="mensaje" rows="6" placeholder="Escribe tu mensaje"></textarea>

<button onclick="generarLink()">
Generar Link ❤️
</button>

<div id="resultado"></div>

</div>

<script>

function generarLink(){

const datos={

n:document.getElementById("nombre").value,
p:document.getElementById("pareja").value,
m:document.getElementById("mensaje").value

};

const codigo=btoa(
unescape(
encodeURIComponent(
JSON.stringify(datos)
)
)
);

const base=
window.location.origin+
window.location.pathname.replace("index.html","");

const link=
base+
"johana.html#"+
codigo;

document.getElementById("resultado").innerHTML=
link;

}

</script>

</body>
</html>
