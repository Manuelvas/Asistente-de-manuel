<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistente de Manuel</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0;
  overflow:hidden;
}

.container{
  background:white;
  padding:25px;
  border-radius:20px;
  width:350px;
  text-align:center;
  position:relative;
  z-index:2;
}

.hidden{display:none}

button{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff6b81;
  color:white;
  cursor:pointer;
  opacity:0;
  transition:1s;
}

.show{opacity:1}

input,textarea{
  width:100%;
  margin-top:8px;
  padding:8px;
  border-radius:10px;
}

.assistant{
  background:#f1f1f1;
  padding:20px;
  border-radius:10px;
  margin-top:15px;
  white-space:pre-line;
  line-height:1.8;
  font-size:16px;
}

/* Carta */
.carta{
  width:100px;
  height:70px;
  background:white;
  border:2px solid #ff6b81;
  margin:20px auto;
  cursor:pointer;
}

/* Corazones */
.heart{
  position:absolute;
  color:#ff6b81;
  animation:subir 5s linear infinite;
}

@keyframes subir{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh);opacity:0}
}
</style>

</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
  <h3>🔐 Panel Admin</h3>
  <input type="password" id="clave" placeholder="Contraseña">
  <button onclick="entrar()" style="opacity:1">Entrar</button>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">
  <h3>💌 Crear Nota</h3>
  <input id="nombre" placeholder="Tu nombre">
  <input id="pareja" placeholder="Nombre pareja">
  <textarea id="mensaje" placeholder="Mensaje"></textarea>
  <button onclick="crearLink()" style="opacity:1">Generar Link</button>
  <div id="link" class="assistant"></div>
</div>

<!-- PRESENTACION -->
<div id="presentacion" class="hidden">
  <div id="saludo" class="assistant"></div>
  <button id="btnVer" onclick="mostrarCarta()">Ver nota 💌</button>
</div>

<!-- CARTA -->
<div id="cartaBox" class="hidden">
  <div class="carta" onclick="verNota()"></div>
  <p>Toca la carta 💌</p>
</div>

<!-- NOTA -->
<div id="nota" class="hidden">
  <div id="contenido" class="assistant"></div>
</div>

</div>

<!-- SONIDOS -->
<audio id="click">
  <source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

<audio autoplay loop>
  <source src="https://music.youtube.com/search?q=instrumental+de+amor">
</audio>

<script>

const PASSWORD="1234";

// LOGIN
function entrar(){
  if(clave.value===PASSWORD){
    login.classList.add('hidden');
    admin.classList.remove('hidden');
  }else alert('Incorrecta');
}

// CREAR LINK
function crearLink(){
  const url=`${location.origin}${location.pathname}?modo=novia&n=${encodeURIComponent(nombre.value)}&p=${encodeURIComponent(pareja.value)}&m=${encodeURIComponent(mensaje.value)}`;
  link.innerText=url;
}

// EFECTO ESCRIBIR
function escribir(el,texto){
  let i=0;
  el.innerText="";
  function t(){
    if(i<texto.length){
      el.innerText+=texto[i];
      i++;
      setTimeout(t,30);
    }
  }
  t();
}

// CARTA
function mostrarCarta(){
  presentacion.classList.add('hidden');
  cartaBox.classList.remove('hidden');
}

// VER NOTA
function verNota(){
  cartaBox.classList.add('hidden');
  nota.classList.remove('hidden');

  escribir(contenido,
`💌 Esta nota es para:

${params.get('p')}


💖 Mensaje:

"${params.get('m')}"`);

  click.play();
}

// CORAZONES
setInterval(()=>{
  const h=document.createElement('div');
  h.className='heart';
  h.innerText='💗';
  h.style.left=Math.random()*100+'vw';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},500);

// DETECTAR MODO
const params=new URLSearchParams(location.search);

if(params.get('modo')==='novia'){
  login.classList.add('hidden');

  presentacion.classList.remove('hidden');

  escribir(saludo,
`💌 Hola ${params.get('p')}, soy el asistente de Manuel

Tengo una nota para ti 💖`);

  setTimeout(()=>btnVer.classList.add('show'),3000);
}

</script>

</body>
</html>
