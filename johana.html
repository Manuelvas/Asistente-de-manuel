<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Johana ❤️</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
}

.container{
max-width:800px;
background:white;
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.2);
}

h1{
color:#ff4d6d;
}

button{
padding:12px 25px;
border:none;
border-radius:12px;
background:#ff4d6d;
color:white;
cursor:pointer;
font-size:16px;
}

.carta{
font-size:100px;
cursor:pointer;
animation:latir 1s infinite;
}

@keyframes latir{
50%{
transform:scale(1.1);
}
}

.hidden{
display:none;
}

.mensaje{
background:#f8f8f8;
padding:20px;
border-radius:15px;
line-height:1.8;
white-space:pre-line;
margin-top:20px;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-top:20px;
}

.galeria img{
width:100%;
border-radius:15px;
}

.heart{
position:fixed;
font-size:25px;
animation:subir 5s linear forwards;
}

@keyframes subir{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>❤️ Hola Johana ❤️</h1>

<p>
Tengo algo especial preparado por Manuel.
</p>

<button onclick="mostrarCarta()">
Abrir sorpresa 💌
</button>

<div id="carta" class="hidden">

<div class="carta" onclick="abrirNota()">
💌
</div>

<p>Toca la carta</p>

</div>

<div id="nota" class="hidden">

<div class="mensaje">

<h2>Para ti ❤️</h2>

<p>

Mi amor:

Gracias por cada momento compartido.

Desde el 09/02/2023 has sido una parte muy importante de mi vida.

Quiero que esta pequeña página sea un recuerdo especial para ti.

Con mucho cariño,

❤️ Manuel ❤️

</p>

</div>

<div class="galeria">

<img src="img/foto1.jpg">
<img src="img/foto2.jpg">
<img src="img/foto3.jpg">
<img src="img/foto4.jpg">

</div>

</div>

</div>

<script>

function mostrarCarta(){
document.getElementById("carta").classList.remove("hidden");
}

function abrirNota(){
document.getElementById("nota").classList.remove("hidden");
}

setInterval(()=>{

const h=document.createElement("div");

h.className="heart";

h.innerHTML="💗";

h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},5000);

},600);

</script>

</body>
</html>
